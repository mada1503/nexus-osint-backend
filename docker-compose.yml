

services:
  # --- PostgreSQL Database ---
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus_secret
      POSTGRES_DB: nexussearch
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  # --- Redis (Task Queue Broker) ---
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # --- FastAPI Backend ---
  api:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # --- Celery Worker ---
  worker:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=8

  # --- Celery Flower (Task Monitor UI) ---
  flower:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    ports:
      - "5555:5555"
    depends_on:
      - redis
      - worker
    command: celery -A app.workers.celery_app flower --port=5555

volumes:
  pg_data:
