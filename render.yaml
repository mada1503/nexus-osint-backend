services:
  # 1. Base de données PostgreSQL
  - type: psql
    name: nexussearch-db
    databaseName: nexus_db
    user: nexus_user
    plan: free

  # 2. Instance Redis
  - type: redis
    name: nexussearch-redis
    plan: free
    maxmemoryPolicy: noeviction

  # 3. L'API FastAPI
  - type: web
    name: nexussearch-api
    env: docker
    dockerfilePath: ./backend/Dockerfile
    plan: free
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nexussearch-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: nexussearch-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: nexussearch-redis
          property: connectionString
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"

  # 4. Le Worker Celery
  - type: worker
    name: nexussearch-worker
    env: docker
    dockerfilePath: ./backend/Dockerfile
    plan: free
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nexussearch-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: nexussearch-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: nexussearch-redis
          property: connectionString
    startCommand: "celery -A app.workers.celery_app worker --loglevel=info -c 4"
