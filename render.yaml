databases:
  - name: nexussearch-db
    databaseName: nexus_db
    user: nexus_user
    plan: free

services:
  # 1. Instance Redis
  - type: redis
    name: nexussearch-redis
    plan: free
    ipAllowList: [] # Allow all internal

  # 2. L'API FastAPI
  - type: web
    name: nexussearch-api
    env: docker
    dockerfilePath: ./backend/Dockerfile
    plan: free
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nexussearch-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: nexussearch-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: nexussearch-redis
          property: connectionString
    dockerCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"

  # 3. Le Worker Celery
  - type: worker
    name: nexussearch-worker
    env: docker
    dockerfilePath: ./backend/Dockerfile
    plan: free
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nexussearch-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: nexussearch-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: nexussearch-redis
          property: connectionString
    dockerCommand: "celery -A app.workers.celery_app worker --loglevel=info -c 4"
